name: Blocks Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install blocks CLI
        run: npm install -g blocks-cli@latest

      - name: Verify
        run: blocks verify --path . --format github

      - name: Test
        run: blocks test --path .
