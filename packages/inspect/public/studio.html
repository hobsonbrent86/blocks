<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Block Studio</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222633;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --pass: #34a853;
      --warn: #fbbc04;
      --fail: #ea4335;
      --skip: #5f6368;
      --na: #3c4043;
      --border: #2d3142;
      --accent: #8ab4f8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }
    header p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-toggle button {
      border: none;
      border-radius: 0;
      border-right: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 0.75rem;
      background: var(--bg);
    }
    .view-toggle button:last-child { border-right: none; }
    .view-toggle button.active {
      background: var(--surface2);
      color: var(--accent);
    }
    .stats {
      display: flex;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .stat strong { color: var(--text); }
    button {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--muted); }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 200px 1fr 380px;
      min-height: 0;
    }
    .block-list {
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow: auto;
      padding: 8px 0;
    }
    .block-list h3 {
      margin: 0;
      padding: 8px 12px 6px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .block-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .block-item:hover { background: var(--surface2); }
    .block-item.selected {
      background: var(--surface2);
      border-left-color: var(--accent);
    }
    .block-item .dot { margin-top: 4px; }
    .block-item-id {
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.2;
      word-break: break-word;
    }
    .block-item-species {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .graph-pane {
      position: relative;
      overflow: auto;
      background:
        radial-gradient(circle at 1px 1px, #2d3142 1px, transparent 0) 0 0 / 24px 24px;
    }
    #canvas {
      position: relative;
      min-width: 100%;
      min-height: 100%;
    }
    #edges {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .node {
      position: absolute;
      width: 188px;
      padding: 10px 12px 10px 14px;
      border-radius: 10px;
      border: 2px solid var(--border);
      border-left-width: 4px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .node.unwired-node { opacity: 0.9; }
    .species-ingress { border-left-color: #8ab4f8; }
    .species-transform { border-left-color: #ce93d8; }
    .species-validate { border-left-color: #fbbc04; }
    .species-persist { border-left-color: #34a853; }
    .species-emit { border-left-color: #ff8a65; }
    .species-gate { border-left-color: #ea4335; }
    .species-query { border-left-color: #80cbc4; }
    .node-desc {
      margin-top: 4px;
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .lane-label {
      position: absolute;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .edge-label {
      font-size: 9px;
      fill: var(--muted);
      pointer-events: none;
    }
    .node:hover { border-color: var(--muted); }
    .node.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.25);
    }
    .node.working { border-color: var(--pass); }
    .node.structure { border-color: var(--warn); }
    .node.fail { border-color: var(--fail); }
    .node.missing {
      border-style: dashed;
      border-color: var(--skip);
      opacity: 0.85;
    }
    .node-id {
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.2;
      word-break: break-word;
    }
    .node-meta {
      margin-top: 4px;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .node-badges {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
    }
    .detail-pane {
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .detail-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 24px;
      text-align: center;
    }
    .graph-load-error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      color: var(--fail);
      font-size: 0.9rem;
      line-height: 1.5;
      z-index: 2;
    }
    .detail-header h2 {
      margin: 0 0 4px;
      font-size: 0.95rem;
    }
    .detail-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .status-banner {
      margin: 0 16px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .status-banner.pass { background: rgba(52, 168, 83, 0.15); color: var(--pass); }
    .status-banner.warn { background: rgba(251, 188, 4, 0.12); color: var(--warn); }
    .status-banner.fail { background: rgba(234, 67, 53, 0.15); color: var(--fail); }
    .detail-body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .steps {
      padding: 8px 0;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 16px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .dot.pass { background: var(--pass); }
    .dot.fail { background: var(--fail); }
    .dot.skip { background: var(--skip); }
    .dot.na { background: transparent; border: 2px solid var(--muted); }
    .step-label { font-weight: 500; font-size: 0.85rem; }
    .step-msg { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
    .detail-section {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
    }
    .detail-section h3 {
      margin: 0 0 8px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .detail-purpose {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.45;
    }
    .detail-elements {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .detail-elements li {
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .detail-elements li:last-child { border-bottom: none; }
    .detail-elements code {
      font-size: 0.78rem;
      color: #8ab4f8;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .el-detail {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 3px;
      line-height: 1.35;
    }
    .detail-species {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .legend {
      position: absolute;
      left: 12px;
      bottom: 12px;
      display: flex;
      gap: 12px;
      padding: 8px 12px;
      background: rgba(26, 29, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr 380px; }
      .block-list { display: none; }
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .detail-pane { border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="graph-title">Block Studio</h1>
      <p id="graph-desc"></p>
    </div>
    <div class="header-actions">
      <div class="view-toggle" id="view-toggle">
        <button type="button" data-view="graph">Graph</button>
        <button type="button" data-view="extended" class="active">+ Unwired</button>
        <button type="button" data-view="all">All blocks</button>
      </div>
      <div class="stats" id="stats"></div>
      <button type="button" id="refresh">Refresh</button>
    </div>
  </header>
  <main>
    <nav class="block-list" id="block-list">
      <h3>Blocks</h3>
    </nav>
    <section class="graph-pane">
      <div id="canvas">
        <svg id="edges"></svg>
      </div>
      <div class="legend">
        <span><i style="background:var(--pass)"></i> Working</span>
        <span><i style="background:var(--warn)"></i> Structure OK</span>
        <span><i style="background:var(--fail)"></i> Needs fixes</span>
        <span><i style="background:var(--skip); border:1px dashed var(--muted)"></i> Not built</span>
      </div>
    </section>
    <aside class="detail-pane" id="detail">
      <div class="detail-empty">Click a block to inspect it</div>
    </aside>
  </main>
  <script>
    let graphData = null;
    let selectedId = null;
    let nodeEls = {};
    let currentView = 'extended';

    const SPECIES_LABEL = {
      ingress: 'ingress', transform: 'transform', validate: 'validate',
      persist: 'persist', emit: 'emit', gate: 'gate', query: 'query'
    };

    function layerLayout(nodes, edges) {
      const wired = nodes.filter(n => n.wired !== false);
      const unwired = nodes.filter(n => n.wired === false);
      const ids = wired.map(n => n.id);
      const incoming = new Map(ids.map(id => [id, 0]));
      const adj = new Map(ids.map(id => [id, []]));
      const revAdj = new Map(ids.map(id => [id, []]));
      for (const e of edges) {
        if (!adj.has(e.from) || !incoming.has(e.to)) continue;
        adj.get(e.from).push(e.to);
        revAdj.get(e.to).push(e.from);
        incoming.set(e.to, (incoming.get(e.to) || 0) + 1);
      }
      const entries = wired.filter(n => n.isEntry).map(n => n.id);
      const queue = entries.length ? [...entries] : ids.filter(id => incoming.get(id) === 0);
      const layer = new Map();
      for (const id of queue) layer.set(id, 0);
      const seen = new Set(queue);
      while (queue.length) {
        const id = queue.shift();
        const depth = layer.get(id) || 0;
        for (const next of adj.get(id) || []) {
          layer.set(next, Math.max(layer.get(next) || 0, depth + 1));
          if (!seen.has(next)) {
            seen.add(next);
            queue.push(next);
          }
        }
      }
      for (const id of ids) if (!layer.has(id)) layer.set(id, 0);
      const columns = new Map();
      for (const id of ids) {
        const col = layer.get(id) || 0;
        if (!columns.has(col)) columns.set(col, []);
        columns.get(col).push(id);
      }
      for (const colIds of columns.values()) colIds.sort((a, b) => a.localeCompare(b));

      const colNums = [...columns.keys()].sort((a, b) => a - b);
      const avgIndex = (neighbors, refCol) => {
        if (!neighbors.length) return null;
        const ref = columns.get(refCol) || [];
        return neighbors.reduce((sum, id) => sum + Math.max(0, ref.indexOf(id)), 0) / neighbors.length;
      };
      for (let pass = 0; pass < 4; pass++) {
        for (const col of colNums.slice(1)) {
          columns.get(col).sort((a, b) => {
            const pa = revAdj.get(a).filter(id => layer.get(id) === col - 1);
            const pb = revAdj.get(b).filter(id => layer.get(id) === col - 1);
            const ba = avgIndex(pa, col - 1);
            const bb = avgIndex(pb, col - 1);
            if (ba != null && bb != null && ba !== bb) return ba - bb;
            if (ba != null && bb == null) return -1;
            if (ba == null && bb != null) return 1;
            return a.localeCompare(b);
          });
        }
        for (const col of [...colNums].slice(0, -1).reverse()) {
          columns.get(col).sort((a, b) => {
            const sa = adj.get(a).filter(id => layer.get(id) === col + 1);
            const sb = adj.get(b).filter(id => layer.get(id) === col + 1);
            const ba = avgIndex(sa, col + 1);
            const bb = avgIndex(sb, col + 1);
            if (ba != null && bb != null && ba !== bb) return ba - bb;
            if (ba != null && bb == null) return -1;
            if (ba == null && bb != null) return 1;
            return a.localeCompare(b);
          });
        }
      }

      const positions = {};
      const colWidth = 240;
      const rowHeight = 108;
      const padX = 48;
      const padY = 48;
      let maxCol = 0;
      let maxRows = 0;
      for (const colIds of columns.values()) maxRows = Math.max(maxRows, colIds.length);
      for (const [col, colIds] of [...columns.entries()].sort((a, b) => a[0] - b[0])) {
        maxCol = Math.max(maxCol, col);
        const offset = (maxRows - colIds.length) / 2;
        colIds.forEach((id, row) => {
          positions[id] = {
            x: padX + col * colWidth,
            y: padY + (offset + row) * rowHeight,
          };
        });
      }
      const unwiredCol = maxCol + 1;
      const unwiredOffset = (maxRows - unwired.length) / 2;
      unwired.forEach((node, row) => {
        positions[node.id] = {
          x: padX + unwiredCol * colWidth,
          y: padY + (unwiredOffset + row) * rowHeight,
        };
      });
      const totalRows = Math.max(maxRows, unwired.length);
      return {
        positions,
        width: padX * 2 + (unwired.length ? unwiredCol + 1 : maxCol + 1) * colWidth,
        height: padY * 2 + totalRows * rowHeight,
        unwiredCol: unwired.length ? unwiredCol : null,
        unwiredCount: unwired.length,
      };
    }

    function renderBlockList(nodes) {
      const list = document.getElementById('block-list');
      list.innerHTML = '<h3>Blocks (' + nodes.length + ')</h3>';
      for (const node of nodes) {
        const item = document.createElement('div');
        item.className = 'block-item' + (node.id === selectedId ? ' selected' : '');
        item.innerHTML =
          '<div class="dot ' + node.status + '"></div>' +
          '<div><div class="block-item-id">' + node.id + '</div>' +
          '<div class="block-item-species">' + (node.wired === false ? 'unwired · ' : '') +
          (SPECIES_LABEL[node.species] || node.species) + '</div></div>';
        item.addEventListener('click', () => selectBlock(node.id));
        list.appendChild(item);
      }
    }

    function renderNodeEl(node, pos) {
      const el = document.createElement('div');
      const unwired = node.wired === false;
      el.className = 'node species-' + node.species + ' ' + node.status +
        (unwired ? ' unwired-node' : '') + (node.id === selectedId ? ' selected' : '');
      el.style.left = pos.x + 'px';
      el.style.top = pos.y + 'px';
      el.dataset.id = node.id;
      const badges = [];
      if (node.isEntry) badges.push('<span class="badge">entry</span>');
      if (node.isExit) badges.push('<span class="badge">exit</span>');
      if (unwired) badges.push('<span class="badge">unwired</span>');
      el.innerHTML =
        '<div class="node-id">' + node.id + '</div>' +
        (node.description ? '<div class="node-desc">' + node.description + '</div>' : '') +
        '<div class="node-meta">' + (node.message || '') + '</div>' +
        (badges.length ? '<div class="node-badges">' + badges.join('') + '</div>' : '');
      el.addEventListener('click', () => selectBlock(node.id));
      return el;
    }

    function renderGraph(data) {
      graphData = data;
      document.getElementById('graph-title').textContent = data.graph.id;
      document.getElementById('graph-desc').textContent = data.graph.description || '';
      const s = data.summary;
      let statsHtml =
        '<span><strong>' + s.working + '</strong> working</span>' +
        '<span><strong>' + s.structure + '</strong> structure</span>' +
        '<span><strong>' + s.fail + '</strong> fail</span>' +
        '<span><strong>' + s.missing + '</strong> missing</span>';
      if (data.graphTest && data.graphTest.cases.length > 0) {
        statsHtml += '<span><strong>' + (s.graphWorking ? '✓' : '✗') + '</strong> graph e2e</span>';
      }
      if (s.finalize > 0) {
        statsHtml += '<span><strong>' + s.finalize + '</strong> finalize</span>';
      }
      document.getElementById('stats').innerHTML = statsHtml +
        (data.unwired && data.unwired.length ? '<span><strong>' + data.unwired.length + '</strong> unwired</span>' : '');

      const canvas = document.getElementById('canvas');
      const layout = layerLayout(data.nodes, data.graph.edges);
      canvas.style.width = layout.width + 'px';
      canvas.style.height = layout.height + 'px';

      for (const el of canvas.querySelectorAll('.node, .lane-label')) el.remove();
      nodeEls = {};

      renderBlockList(data.nodes);

      for (const node of data.nodes) {
        const pos = layout.positions[node.id] || { x: 48, y: 48 };
        const el = renderNodeEl(node, pos);
        canvas.appendChild(el);
        nodeEls[node.id] = el;
      }

      if (layout.unwiredCol != null) {
        const label = document.createElement('div');
        label.className = 'lane-label';
        label.style.left = (48 + layout.unwiredCol * 240) + 'px';
        label.style.top = '16px';
        label.textContent = 'Not in graph';
        canvas.appendChild(label);
      }

      const svg = document.getElementById('edges');
      svg.setAttribute('width', layout.width);
      svg.setAttribute('height', layout.height);
      svg.innerHTML = '';
      for (const edge of data.graph.edges) {
        const from = nodeEls[edge.from];
        const to = nodeEls[edge.to];
        if (!from || !to) continue;
        const x1 = from.offsetLeft + from.offsetWidth;
        const y1 = from.offsetTop + from.offsetHeight / 2;
        const x2 = to.offsetLeft;
        const y2 = to.offsetTop + to.offsetHeight / 2;
        const mx = (x1 + x2) / 2;
        const spread = Math.max(56, (x2 - x1) * 0.42);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute(
          'd',
          'M' + x1 + ',' + y1 +
          ' C' + (x1 + spread) + ',' + y1 + ' ' + (x2 - spread) + ',' + y2 + ' ' + x2 + ',' + y2,
        );
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', '#5f6368');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('marker-end', 'url(#arrow)');
        svg.appendChild(path);
        if (edge.fromPort || edge.toPort) {
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', mx);
          text.setAttribute('y', (y1 + y2) / 2 - 6);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('class', 'edge-label');
          text.textContent = (edge.fromPort || '') + (edge.fromPort && edge.toPort ? ' → ' : '') + (edge.toPort || '');
          svg.appendChild(text);
        }
      }
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      defs.innerHTML =
        '<marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">' +
        '<path d="M0,0 L8,4 L0,8 Z" fill="#5f6368"/></marker>';
      svg.prepend(defs);

      if (selectedId && nodeEls[selectedId]) loadBlockDetail(selectedId);
    }

    async function loadGraph() {
      const res = await fetch('/api/graph?view=' + encodeURIComponent(currentView));
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const errEl = document.getElementById('graph-load-error');
      if (errEl) errEl.remove();
      renderGraph(data);
    }

    function showGraphError(message) {
      document.getElementById('graph-title').textContent = 'Block Studio';
      document.getElementById('graph-desc').textContent = message;
      document.getElementById('stats').innerHTML = '';
      const canvas = document.getElementById('canvas');
      canvas.querySelectorAll('.node, .lane-label, .graph-load-error').forEach(el => el.remove());
      nodeEls = {};
      const err = document.createElement('div');
      err.id = 'graph-load-error';
      err.className = 'graph-load-error';
      err.innerHTML = '<div><strong>Graph failed to load</strong><br>' + escapeHtml(message) +
        '<br><br><span style="color:var(--muted)">Stop and restart Studio from your project root, then click Refresh.</span></div>';
      canvas.appendChild(err);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderBlockGuide(guide) {
      if (!guide) return '';
      const elementsHtml = (guide.elements || []).map(function(el) {
        return '<li><code>' + escapeHtml(el.label) + '</code>' +
          (el.detail ? '<div class="el-detail">' + escapeHtml(el.detail) + '</div>' : '') +
          '</li>';
      }).join('');
      return (
        '<div class="detail-section">' +
        '<h3>Purpose</h3>' +
        '<p class="detail-purpose">' + escapeHtml(guide.purpose) + '</p>' +
        '</div>' +
        '<div class="detail-section">' +
        '<h3>Important elements</h3>' +
        '<ul class="detail-elements">' + elementsHtml + '</ul>' +
        '</div>'
      );
    }

    function renderBlockReport(report) {
      const coreStep = report.steps.find(s => s.id === 'core');
      let bannerText = 'Needs fixes';
      let bannerClass = 'fail';
      if (report.ok) {
        bannerText = 'Working';
        bannerClass = 'pass';
      } else if (coreStep && coreStep.status === 'pass') {
        bannerText = 'Structure OK';
        bannerClass = 'warn';
      }
      const stepsHtml = report.steps
        .filter(s => !(s.id === 'contract' && report.block))
        .map(s =>
          '<div class="step">' +
          '<div class="dot ' + s.status + '"></div>' +
          '<div><div class="step-label">' + s.label + '</div>' +
          (s.message ? '<div class="step-msg">' + escapeHtml(s.message) + '</div>' : '') +
          '</div></div>'
        ).join('');
      const species = report.block ? report.block.split('.')[0] : '';
      const subtitle = species ? '<p class="detail-species">' + escapeHtml(species) + '</p>' : '';
      return (
        '<div class="detail-header"><h2>' + escapeHtml(report.block || '') + '</h2>' + subtitle + '</div>' +
        '<div class="status-banner ' + bannerClass + '">' + bannerText + '</div>' +
        '<div class="detail-body">' +
        '<div class="steps">' + stepsHtml + '</div>' +
        renderBlockGuide(report.guide) +
        '</div>'
      );
    }

    async function loadBlockDetail(blockId) {
      selectedId = blockId;
      for (const id in nodeEls) {
        nodeEls[id].classList.toggle('selected', id === blockId);
      }
      const detail = document.getElementById('detail');
      detail.innerHTML = '<div class="detail-empty">Loading…</div>';
      const res = await fetch('/api/report?block=' + encodeURIComponent(blockId));
      const report = await res.json();
      if (report.error) {
        detail.innerHTML = '<div class="detail-empty">' + report.error + '</div>';
        return;
      }
      detail.innerHTML = renderBlockReport(report);
      if (graphData && nodeEls[blockId]) {
        const core = report.steps.find(s => s.id === 'core');
        let status = 'fail';
        if (report.ok && core && core.status === 'pass') status = 'working';
        else if (report.ok) status = 'structure';
        const node = graphData.nodes.find(n => n.id === blockId);
        if (node) {
          node.status = status;
          node.message = core?.message || node.message;
          nodeEls[blockId].className = 'node ' + status + ' selected';
          const meta = nodeEls[blockId].querySelector('.node-meta');
          if (meta) meta.textContent = node.message || '';
        }
      }
    }

    function selectBlock(blockId) {
      loadBlockDetail(blockId);
    }

    document.getElementById('refresh').addEventListener('click', async () => {
      await loadGraph();
    });

    document.getElementById('view-toggle').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-view]');
      if (!btn) return;
      currentView = btn.dataset.view;
      for (const b of document.querySelectorAll('#view-toggle button')) {
        b.classList.toggle('active', b.dataset.view === currentView);
      }
      loadGraph().catch(err => {
        showGraphError(err.message);
      });
    });

    loadGraph().catch(err => {
      showGraphError(err.message);
    });
    setInterval(() => loadGraph().catch(err => showGraphError(err.message)), 8000);
  </script>
</body>
</html>
